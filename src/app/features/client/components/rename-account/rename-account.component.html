<div class="z-overlay">
  <div class="z-modal w-full max-w-sm" (click)="$event.stopPropagation()">
    <div class="z-modal-header">
      <div>
        <h2 class="text-lg font-semibold">Promena naziva računa</h2>
        <p class="text-xs text-muted-foreground mt-0.5">Unesite novi naziv za račun</p>
      </div>
    </div>

    <form [formGroup]="renameForm">
      <div class="z-modal-body space-y-4">
        <div>
          <label class="z-label">Trenutni naziv</label>
          <div class="z-input bg-muted cursor-default">{{ account.name }}</div>
        </div>

        <div>
          <label class="z-label" for="newName">Novi naziv</label>
          <input
            id="newName"
            type="text"
            class="z-input"
            formControlName="newName"
            placeholder="Unesite novo ime..."
            [class.border-red-500]="renameForm.get('newName')?.touched && renameForm.get('newName')?.invalid"
          />
          <div *ngIf="renameForm.get('newName')?.touched">
            <p class="z-error" *ngIf="renameForm.get('newName')?.errors?.['required']">Polje je obavezno.</p>
            <p class="z-error" *ngIf="renameForm.get('newName')?.errors?.['sameName']">Novo ime mora biti različito od trenutnog.</p>
            <p class="z-error" *ngIf="renameForm.get('newName')?.errors?.['nameExists']">Ovaj naziv već postoji na drugom računu.</p>
          </div>
        </div>
      </div>

      <div class="z-modal-footer">
        <button type="button" class="z-btn z-btn-outline" (click)="onCancel()">Nazad</button>
        <button type="button" class="z-btn z-btn-primary" (click)="onConfirm()" [disabled]="renameForm.invalid">Potvrdi</button>
      </div>
    </form>
  </div>
</div>
