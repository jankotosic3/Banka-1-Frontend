<div class="modal-overlay" (click)="onOverlayClick($event)">
  <div class="modal-card">
    <div class="modal-header">
      <h2>Edit employee</h2>
      <button type="button" class="btn-close" (click)="onCancel()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <form [formGroup]="editForm" (ngSubmit)="onSave()">
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-field">
            <label>First name <span class="required">*</span></label>
            <input type="text" formControlName="ime" placeholder="First name" />
            <p class="field-error" *ngIf="editForm.get('ime')?.invalid && editForm.get('ime')?.touched">
              Required (min 2 characters).
            </p>
          </div>

          <div class="form-field">
            <label>Last name <span class="required">*</span></label>
            <input type="text" formControlName="prezime" placeholder="Last name" />
            <p class="field-error" *ngIf="editForm.get('prezime')?.invalid && editForm.get('prezime')?.touched">
              Required (min 2 characters).
            </p>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-field">
            <label>Phone number <span class="required">*</span></label>
            <input type="text" formControlName="brojTelefona" placeholder="+381..." />
            <p class="field-error" *ngIf="editForm.get('brojTelefona')?.invalid && editForm.get('brojTelefona')?.touched">
              Phone number is required.
            </p>
          </div>

          <div class="form-field">
            <label>Address</label>
            <input type="text" formControlName="adresa" placeholder="Address" />
          </div>
        </div>

        <div class="form-grid">
          <div class="form-field">
            <label>Position</label>
            <input type="text" formControlName="pozicija" placeholder="Position" />
          </div>

          <div class="form-field">
            <label>Department</label>
            <input type="text" formControlName="departman" placeholder="Department" />
          </div>
        </div>

        <div class="form-grid">
          <div class="form-field">
            <label>Role</label>
            <select formControlName="role">
              <option value="BASIC">Basic</option>
              <option value="AGENT">Agent</option>
              <option value="SUPERVISOR">Supervisor</option>
              <option value="ADMIN">Admin</option>
            </select>
          </div>

          <div class="form-field">
            <label>Status</label>
            <select formControlName="aktivan">
              <option [ngValue]="true">Active</option>
              <option [ngValue]="false">Inactive</option>
            </select>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-outline" (click)="onCancel()">Cancel</button>
        <button type="submit" class="btn-primary" [disabled]="editForm.invalid">Save changes</button>
      </div>
    </form>
  </div>
</div>
