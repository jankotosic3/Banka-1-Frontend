<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-green-950 via-green-800 to-green-600 p-6">
  <div class="w-full max-w-md bg-card rounded-2xl shadow-2xl border border-border/30 p-8 animate-fade-in">
    <!-- Back -->
    <button type="button" (click)="goToLanding()"
            class="inline-flex items-center gap-1.5 text-sm text-muted-foreground hover:text-foreground transition-colors mb-6 bg-transparent border-0 cursor-pointer">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Nazad
    </button>

    <!-- Header -->
    <div class="text-center mb-6">
      <div class="w-16 h-16 mx-auto mb-4 rounded-xl bg-secondary flex items-center justify-center">
        <img src="assets/images/logo.png" alt="Banka 1" class="w-12 h-12 object-contain" />
      </div>
      <h1 class="text-2xl font-bold text-foreground">Banka 1</h1>
      <p class="text-sm text-muted-foreground mt-1">Prijavite se na vaš nalog</p>
    </div>

    <!-- Error Alert -->
    <div *ngIf="errorMessage"
         class="flex items-center gap-2.5 p-3 mb-5 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
      <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="15" y1="9" x2="9" y2="15"></line>
        <line x1="9" y1="9" x2="15" y2="15"></line>
      </svg>
      <span>{{ errorMessage }}</span>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" novalidate class="space-y-4">
      <div class="space-y-1.5">
        <label for="email" class="block text-sm font-medium text-foreground">Email</label>
        <input id="email" data-cy="email" type="email" name="email" [(ngModel)]="email"
               placeholder="Unesite email" autocomplete="email"
               class="w-full h-10 px-3 rounded-lg border border-input bg-background text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring/20 focus:border-primary transition-colors" />
      </div>

      <div class="space-y-1.5">
        <label for="password" class="block text-sm font-medium text-foreground">Lozinka</label>
        <div class="relative">
          <input id="password" data-cy="password" [type]="isPasswordVisible ? 'text' : 'password'"
                 name="password" [(ngModel)]="password" placeholder="Unesite lozinku" autocomplete="current-password"
                 class="w-full h-10 px-3 pr-10 rounded-lg border border-input bg-background text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring/20 focus:border-primary transition-colors" />
          <button type="button" (click)="togglePasswordVisibility()"
                  [attr.aria-label]="isPasswordVisible ? 'Hide password' : 'Show password'"
                  class="absolute right-2.5 top-1/2 -translate-y-1/2 p-1 text-muted-foreground hover:text-foreground transition-colors bg-transparent border-0 cursor-pointer">
            <svg *ngIf="!isPasswordVisible" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg *ngIf="isPasswordVisible" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </button>
        </div>
        <div class="flex justify-end">
          <button type="button" (click)="goToForgotPassword()"
                  class="text-xs text-primary hover:text-primary/80 transition-colors bg-transparent border-0 cursor-pointer font-medium">
            Zaboravljena lozinka?
          </button>
        </div>
      </div>

      <button type="submit" data-cy="login-btn" [disabled]="isLoading"
              class="w-full h-10 rounded-lg bg-primary text-primary-foreground text-sm font-semibold border-0 cursor-pointer transition-all hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-ring/20 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
        <svg *ngIf="isLoading" class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
        </svg>
        {{ isLoading ? 'Prijavljivanje...' : 'Prijava' }}
      </button>
    </form>
  </div>
</div>
