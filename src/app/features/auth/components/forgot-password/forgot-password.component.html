<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-green-950 via-green-800 to-green-600 p-6">
  <div class="w-full max-w-md bg-card rounded-2xl shadow-2xl border border-border/30 p-8 animate-fade-in">
    <!-- Back -->
    <button type="button" (click)="goToLogin()"
            class="inline-flex items-center gap-1.5 text-sm text-muted-foreground hover:text-foreground transition-colors mb-6 bg-transparent border-0 cursor-pointer">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Nazad na prijavu
    </button>

    <!-- Before submission -->
    <div *ngIf="!isSubmitted">
      <div class="text-center mb-6">
        <div class="w-14 h-14 mx-auto mb-4 rounded-xl bg-secondary flex items-center justify-center shadow-sm">
          <svg class="w-6 h-6 text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-foreground">Zaboravljena lozinka</h1>
        <p class="text-sm text-muted-foreground mt-1">Unesite email i poslaćemo vam link za resetovanje</p>
      </div>

      <!-- Error Alert -->
      <div *ngIf="errorMessage"
           class="flex items-center gap-2.5 p-3 mb-5 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
        <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="15" y1="9" x2="9" y2="15"></line>
          <line x1="9" y1="9" x2="15" y2="15"></line>
        </svg>
        <span>{{ errorMessage }}</span>
      </div>

      <form (ngSubmit)="onSubmit()" novalidate class="space-y-4">
        <div class="space-y-1.5">
          <label for="email" class="z-label">Email adresa</label>
          <input id="email" type="email" name="email" [(ngModel)]="email"
                 placeholder="Unesite email" autocomplete="email" class="z-input" />
        </div>

        <button type="submit" [disabled]="isLoading"
                class="z-btn-primary z-btn-full flex items-center justify-center gap-2">
          <svg *ngIf="isLoading" class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
          </svg>
          {{ isLoading ? 'Šaljem...' : 'Pošalji link za resetovanje' }}
        </button>
      </form>
    </div>

    <!-- After submission success -->
    <div *ngIf="isSubmitted" class="text-center py-4">
      <div class="w-[72px] h-[72px] mx-auto mb-4 rounded-full bg-gradient-to-br from-green-50 to-green-100 flex items-center justify-center shadow-md success-pop">
        <svg class="w-9 h-9 text-green-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
      </div>
      <h2 class="text-xl font-bold text-foreground mb-2">Proverite email</h2>
      <p class="text-sm text-muted-foreground leading-relaxed">Poslali smo link za resetovanje lozinke na <strong class="text-foreground">{{ email }}</strong>. Kliknite na link u emailu da resetujete lozinku.</p>
      <button type="button" (click)="goToLogin()"
              class="z-btn-primary z-btn-full mt-6">
        Nazad na prijavu
      </button>
    </div>
  </div>
</div>
